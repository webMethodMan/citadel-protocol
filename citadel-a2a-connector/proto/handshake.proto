syntax = "proto3";

package citadel.a2a;

service SovereignHandshake {
  // Fetches a fresh challenge nonce from the peer.
  rpc FetchNonce (NonceRequest) returns (NonceResponse);
  
  // Submits a hardware-signed Mudra for mutual attestation.
  rpc AttestPeer (AttestationRequest) returns (AttestationResponse);
  
  // Standard tool execution (only allowed after successful AttestPeer).
  rpc ExecuteSovereignIntent (ToolRequest) returns (ToolResponse);
}

message NonceRequest {
  string spiffe_id = 1;
}

message NonceResponse {
  bytes nonce = 1; // 32-byte challenge
}

message AttestationRequest {
  bytes seal = 1;           // 32-byte Mudra (cryptographic seal)
  bytes hardware_quote = 2; // Dynamically sized TEE quote
  string spiffe_id = 3;     // Requesting agent's identity
}

message AttestationResponse {
  bool authorized = 1;
  string mudra_id = 2;
}

message ToolRequest {
  string tool_name = 1;
  string arguments_json = 2;
}

message ToolResponse {
  string result_json = 1;
  bytes mudra_receipt = 2;
}
